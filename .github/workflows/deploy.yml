name: Deploy

on:
  push:
    branches: ['**']
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Specific commit SHA to deploy'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build client
        run: |
          cd client
          npm ci
          npm run build
          mkdir -p ../server/public
          cp -r dist/* ../server/public/

      - name: Build server
        working-directory: server
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy standalone
        run: |
          rsync -avz --delete \
            --exclude '.git' --exclude '.github' --exclude 'node_modules' \
            --exclude 'data' --exclude '*.db' --exclude '*.db-wal' --exclude '*.db-shm' \
            -e "ssh -i ~/.ssh/deploy_key" \
            server/.next/standalone/ ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Deploy static assets
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            server/.next/static/ ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:${{ secrets.DEPLOY_PATH }}/.next/static/

      - name: Deploy public assets
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            server/public/ ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:${{ secrets.DEPLOY_PATH }}/public/

      - name: Install native deps and restart
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "\
            cd ${{ secrets.DEPLOY_PATH }} && \
            npm install better-sqlite3 --build-from-source 2>/dev/null; \
            pm2 delete ${{ secrets.SITE_ID }}-preview 2>/dev/null; \
            PORT=${{ secrets.PREVIEW_PORT }} pm2 start server.js --name ${{ secrets.SITE_ID }}-preview"

      - name: Notify Site Manager
        if: always()
        run: |
          curl -s -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$(echo -n '{}' | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | cut -d' ' -f2)" \
            -d '{"action":"completed","workflow_run":{"conclusion":"'${{ job.status }}'","head_sha":"${{ github.sha }}","head_commit":{"message":"deploy"}},"repository":{"full_name":"${{ github.repository }}"},"site_id":"${{ secrets.SITE_ID }}"}'
